<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prabhnoor's Recipe Helper</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h1>Prabhnoor's Recipe Helper</h1>
        
        <form id="ingredient-form">
            <div class="input-group">
                <input type="text" id="ingredient" placeholder="Enter ingredient" required>
                <input type="text" id="quantity" placeholder="Enter quantity" required>
                <button type="button" id="add-ingredient">Add</button>
            </div>
            <button type="submit" class="find-recipe">Find Recipe</button>
        </form>
        
        <!-- Ingredient Table -->
        <table id="ingredient-table">
            <thead>
                <tr>
                    <th>Ingredient</th>
                    <th>Quantity</th>
                </tr>
            </thead>
            <tbody id="ingredient-list"></tbody>
        </table>

        <div id="recipe-result"></div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
